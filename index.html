<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Kiran's 3D Portfolio</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Kiran's interactive 3D web portfolio featuring a cinematic black hole simulation.">
    
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css">
  </head>  
  <body>

    <!-- Loading overlay — dismissed by main.js once all textures are ready -->
    <div id="loading-overlay">
      <h1 class="loading-headline">YOU ARE NOT READY FOR THIS</h1>
      <div class="loading-visual" aria-hidden="true">
        <div class="loading-ring outer"></div>
        <div class="loading-ring inner"></div>
      </div>
      <div class="loading-copy" role="status" aria-live="polite">
        <div id="loading-percentage">0%</div>
        <div id="loading-status">Initializing renderer...</div>
      </div>
    </div>

    <div id="story-overlay" aria-live="polite">
      <section class="story-scene horizon-message" data-story-scene="horizonMessage" aria-hidden="true">
        <h2>YOU ARE <span class="story-accent">STILL</span> <span class="story-accent">NOT READY</span> FOR THIS</h2>
      </section>
    </div>

    <footer id="source-license-links" aria-label="Source and license links">
      <a href="https://github.com/KiranKalluri268/portfolio-3D" target="_blank" rel="noreferrer">Source</a>
      <span aria-hidden="true">/</span>
      <a href="https://github.com/KiranKalluri268/portfolio-3D/blob/main/LICENSE" target="_blank" rel="noreferrer">License</a>
    </footer>

    <script type="x-shader/x-vertex" id="vertexShader">  

      void main()	{
        gl_Position = vec4( position, 1.0 );
      }
    </script>
    <script type="module" src="./src/main.js" defer></script>
  </body>
</html>
